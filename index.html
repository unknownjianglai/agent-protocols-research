    <script>
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true,
            headerIds: true
        });
        
        const fileCache = {};
        
        function generateTOC(content) {
            const toc = document.getElementById('toc');
            toc.innerHTML = '';
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = marked.parse(content);
            const headers = tempDiv.querySelectorAll('h2, h3');
            headers.forEach((header, index) => {
                const link = document.createElement('a');
                link.href = `#${header.id || 'section-' + index}`;
                link.className = `toc-link ${header.tagName.toLowerCase()}`;
                link.textContent = header.textContent;
                link.onclick = (e) => {
                    e.preventDefault();
                    const target = document.getElementById(header.id || 'section-' + index);
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                };
                toc.appendChild(link);
            });
        }
        
        async function loadFile(filename) {
            const contentDiv = document.getElementById('content');
            const currentPage = document.getElementById('current-page');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.file === filename) {
                    item.classList.add('active');
                    currentPage.textContent = item.textContent.trim();
                }
            });
            
            contentDiv.innerHTML = '<div class="skeleton h-8 w-3/4 mb-4"></div><div class="skeleton h-4 w-full mb-2"></div><div class="skeleton h-4 w-5/6 mb-2"></div><div class="skeleton h-4 w-4/6"></div>';
            
            try {
                let content;
                if (fileCache[filename]) {
                    content = fileCache[filename];
                } else {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error(`Failed to load ${filename}`);
                    content = await response.text();
                    fileCache[filename] = content;
                }
                
                generateTOC(content);
                
                // Remove mermaid/plantuml code blocks - just show as plain code
                let cleanContent = content.replace(/```mermaid\n[\s\S]*?```/g, match => {
                    const code = match.replace(/```mermaid\n/, '').replace(/```$/, '');
                    return `<div class="bg-gray-50 border border-gray-200 rounded-lg p-4 my-4"><p class="text-gray-600 text-sm mb-2">📊 图表</p><pre class="bg-white p-3 rounded text-xs overflow-x-auto border"><code>${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre></div>`;
                });
                cleanContent = cleanContent.replace(/```plantuml\n[\s\S]*?```/g, match => {
                    const code = match.replace(/```plantuml\n/, '').replace(/```$/, '');
                    return `<div class="bg-gray-50 border border-gray-200 rounded-lg p-4 my-4"><p class="text-gray-600 text-sm mb-2">📊 图表</p><pre class="bg-white p-3 rounded text-xs overflow-x-auto border"><code>${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre></div>`;
                });
                
                const html = marked.parse(cleanContent);
                contentDiv.innerHTML = html;
                
                const headers = contentDiv.querySelectorAll('h2, h3');
                headers.forEach((header, index) => { if (!header.id) header.id = 'section-' + index; });
                
                document.querySelectorAll('pre code').forEach((block) => { hljs.highlightElement(block); });
                window.location.hash = filename;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
            } catch (error) {
                contentDiv.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-lg p-6"><h2 class="text-red-800 font-semibold mb-2">Failed to load</h2><p class="text-red-600">${error.message}</p></div>`;
            }
        }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => { e.preventDefault(); loadFile(item.dataset.file); });
        });
        
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.slice(1);
            loadFile(hash && hash.endsWith('.md') ? hash : '08-comparison.md');
        });
        
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (hash && hash.endsWith('.md')) loadFile(hash);
        });
    </script>
